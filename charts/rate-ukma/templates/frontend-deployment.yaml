apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rate-ukma.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rate-ukma.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: {{ include "rate-ukma.name" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Copy the React SPA build (from the production webapp image) into the shared emptyDir volume
        # Nginx serves it from there
        - name: copy-webapp
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          command: ["/bin/sh", "-c", "cp -r /dist/. /static/"]
          volumeMounts:
            - name: static-files
              mountPath: /static

        # Run collectstatic to copy Django admin and DRF static assets into the same emptyDir
        # Nginx serves them under /static/admin/ etc
        # collectstatic does not need a database connection
        - name: collect-django-static
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - /opt/venv/bin/python
            - manage.py
            - collectstatic
            - --noinput
          envFrom:
            - configMapRef:
                name: {{ include "rate-ukma.fullname" . }}-config
            - secretRef:
                name: rate-ukma-django
          env:
            # Override STATIC_ROOT from ConfigMap to write into the shared volume
            - name: STATIC_ROOT
              value: /static
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: rate-ukma-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rate-ukma-postgres
                  key: password
          volumeMounts:
            - name: static-files
              mountPath: /static

      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: static-files
              mountPath: /static
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        - name: static-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "rate-ukma.fullname" . }}-nginx-config
