apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rate-ukma.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rate-ukma.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: {{ include "rate-ukma.name" . }}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --maxmemory={{ .Values.redis.maxMemory }}
            - --maxmemory-policy={{ .Values.redis.maxMemoryPolicy }}
            - --appendonly=yes
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rate-ukma.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rate-ukma.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
