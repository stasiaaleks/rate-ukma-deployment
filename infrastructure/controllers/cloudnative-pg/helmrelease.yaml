  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: cnpg-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: cloudnative-pg
