apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  interval: 1h
  # Use our local copy of the manifest to avoid issues with upstream kustomization.yaml
  path: ./infrastructure/controllers/dragonfly/manifests
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
  wait: true
  timeout: 3m
