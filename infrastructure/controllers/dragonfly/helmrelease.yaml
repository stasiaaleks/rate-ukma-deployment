apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: dragonfly-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: dragonfly-operator
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: dragonfly
        namespace: flux-system
      interval: 1h
