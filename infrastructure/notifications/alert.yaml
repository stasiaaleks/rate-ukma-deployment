apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: github-commit-status
  namespace: flux-system
spec:
  providerRef:
    name: github
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: apps
      namespace: flux-system
    - kind: Kustomization
      name: infrastructure
      namespace: flux-system
    - kind: HelmRelease
      name: rate-ukma
      namespace: production
    - kind: ImageUpdateAutomation
      name: rate-ukma
      namespace: flux-system
    - kind: ImagePolicy
      name: rate-ukma-backend
      namespace: flux-system
    - kind: ImagePolicy
      name: rate-ukma-webapp-k8s-beta
      namespace: flux-system
