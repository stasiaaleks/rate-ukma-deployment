apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: rate-ukma-webapp-staging
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: rate-ukma-webapp-staging
  filterTags:
    # Match tags like staging-1.2.3, extract the semver part for comparison
    pattern: '^staging-(?P<ver>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$ver'
  policy:
    semver:
      range: ">=0.0.0"
